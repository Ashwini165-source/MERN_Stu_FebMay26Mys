<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Position Demo</title>

<style>
    <body{
        background-color: aqua;
    }
    .box1{
        position: relative;
            top: 10px;
            left: 300px;
            width: 500px;
            height: 50px;
            background-color:lightblue;
            border: 2px solid black;
            margin:10px;
            color: blueviolet;
            background-color: blanchedalmond;
            text-align: center;  
             
    }
    .box2{
        position: relative;
            top: 0px;
            left: 350px;
            width:400px;
            height:200px;
            background-color:lightblue;
            border: 2px solid black;
            margin:10px;
            color: blueviolet;
            background-color: blanchedalmond;
            text-align: center;   
    }
    .box3{
        position: relative;
            left: 400px;
            width:50px;
            height:100px;
            background-color:lightblue;
            border: 2px solid black;
            margin:10px;
            color: blueviolet;
            background-color: blanchedalmond;
            text-align: center;   
    }
    .box4{
        position: relative;
            top: 0px;
            background-color:lightblue;
            border: 2px solid black;
            margin:10px;
            box-shadow: 5px 4px black;
            color: blueviolet;
            background-color: blanchedalmond;
            text-align: center;   
    }         
    .box5{
        position: relative;
            width:150px;
            height:100px;
            background-color:lightblue;
            border: 2px solid black;
            margin:10px;
            justify-content:center;
            box-shadow: 5px 4px black;
            color: blueviolet;            
            text-align: center;   
    }
</style>
</head>
<body>
    <h2>Assessment</h2>
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>
    <div class="box4">Box 4</div>
    <div class="box5">Box 5</div>
</body>
</html>
