<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Elements: static</title>
    <style>
        
        .box{
            position:static;
            width:150px;
            height:100px;
            background-color:lightblue;
            border: 2px solid black;
            margin:10px;
            justify-content:center;
            border-radius: 10px;
            box-shadow: 5px 4px black;
            color: blueviolet;
            
            text-align: center;
        }
        body{
background-color: aqua;
        }
    </style>
</head>
<body>
    <h2>Static Position</h2>
    <div class="box">Static Box</div>
    </div>
</body>
</html>
